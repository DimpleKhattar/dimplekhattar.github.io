<!doctype html>
<html lang=en dir=auto>
    <head>
        <meta charset=utf-8>
        <meta http-equiv=X-UA-Compatible content="IE=edge">
        <meta name=viewport content="width=device-width,initial-scale=1,shrink-to-fit=no">
        <meta name=robots content="index, follow">
        <title>Dimple Khattar</title>
        <meta name=description content="Dimple Khattar - Economics, Data Science, and Technology Policy">
        <meta name=author content="Dimple Khattar">
        <link rel=canonical href=https://dimplekhattar.github.io/>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html, body {
                height: 100%;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                background-color: #ffffff;
                color: #333;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            main {
                width: 100%;
                padding: 30px;
                max-width: 600px;
            }

            .profile {
                display: flex;
                justify-content: center;
            }

            .profile_inner {
                text-align: left;
                width: 100%;
            }

            .profile_inner img {
                width: 150px;
                height: 150px;
                border-radius: 50%;
                object-fit: cover;
                margin-bottom: 30px;
                display: block;
            }

            .profile_inner h1 {
                font-family: Cambria, Georgia, serif;
                font-size: 2.5em;
                margin-bottom: 20px;
                font-weight: 700;
                letter-spacing: -0.5px;
            }

            .profile_inner span {
                font-family: Calibri, 'Segoe UI', sans-serif;
                font-size: 1em;
                color: #555;
                line-height: 1.7;
                display: block;
                margin-bottom: 30px;
            }

            .social-icons {
                display: flex;
                gap: 20px;
                margin-bottom: 40px;
                flex-wrap: wrap;
                justify-content: flex-start;
                align-items: center;
            }

            .social-icons a {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 32px;
                height: 32px;
                color: #333;
                transition: opacity 0.3s;
            }

            .social-icons a:hover {
                opacity: 0.6;
            }

            .social-icons a img {
                width: 24px;
                height: 24px;
                object-fit: contain;
            }

            .social-icons svg {
                width: 24px;
                height: 24px;
                stroke: currentColor;
                fill: none;
                stroke-width: 2;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            @media (max-width: 600px) {
                body {
                    padding: 20px;
                }

                main {
                    padding: 20px;
                }

                .profile_inner h1 {
                    font-size: 2em;
                }

                .profile_inner img {
                    width: 120px;
                    height: 120px;
                    margin-bottom: 20px;
                }

                .social-icons {
                    gap: 16px;
                }
            }
        </style>
    </head>
