<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Dimple Khattar">
    <meta name="description" content="Dimple Khattar - Personal portfolio">
    <title>Dimple Khattar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #333;
            padding: 60px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0;
            text-align: left;
        }

        /* Profile Section */
        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 20px;
            object-fit: cover;
            margin: 0 0 30px 0;
            display: block;
        }

        h1 {
            font-family: Cambria, Georgia, serif;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .bio {
            font-family: Calibri, 'Segoe UI', sans-serif;
            font-size: 1em;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.7;
        }

        /* Social Icons */
        .social-links {
            display: flex;
            justify-content: flex-start;
            gap: 25px;
            margin-bottom: 40px;
            font-size: 1.3em;
        }

        .social-links a {
            color: #333;
            text-decoration: none;
            transition: opacity 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }

        .social-links a:hover {
            opacity: 0.6;
        }


        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 40px 15px;
            }

            h1 {
                font-size: 2em;
            }

            .profile-image {
                width: 100px;
                height: 100px;
                margin-bottom: 20px;
            }

            .bio {
                font-size: 0.95em;
            }

            .social-links {
                gap: 20px;
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Profile Picture -->
        <img src="profile.jpg" alt="Dimple Khattar" class="profile-image">

        <!-- Name -->
        <h1>Dimple Khattar</h1>

        <!-- Bio -->
        <p class="bio">
            I am a student at the University of Chicago. I am interested in economics, data science, and technology policy. I work on research projects exploring economic trends, labor markets, and the impact of technology on society.
        </p>

        <!-- Social Links -->
        <div class="social-links">
            <a href="resume.pdf">📄</a>
            <a href="#projects">📊</a>
            <a href="https://github.com/dimplekhattar" target="_blank">🐙</a>
            <a href="#education">🎓</a>
            <a href="mailto:dimplekhattar@uchicago.edu">✉️</a>
            <a href="#location">📍</a>
        </div>

    </div>
</body>
</html>
