<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background-color:#F5F2ED;color:#333;line-height:1.7;padding-top:70px;}
.navbar{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background-color:#F5F2ED;border-bottom:1px solid #eee;z-index:100;width:100%;}
.navbar-title{font-family:'DM Serif Display',serif;font-size:1.3em;font-weight:400;}
.navbar-icons{display:flex;gap:20px;}
.navbar-icons a{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;color:#333;transition:opacity 0.3s;}
.navbar-icons a:hover{opacity:0.6;}
.navbar-icons svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
main{width:100%;min-height:calc(100vh - 70px);display:flex;align-items:center;justify-content:center;}
.content-wrapper{max-width:900px;margin:0 auto;padding:60px;text-align:center;}
.kicker{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.18em;color:#666;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:10px;}
.kicker::before,.kicker::after{content:'';display:inline-block;width:24px;height:1px;background:#333;}
h1{font-family:'DM Serif Display',serif;font-size:2.2em;font-weight:400;margin-bottom:16px;letter-spacing:-0.5px;}
.subtitle{font-size:0.95em;color:#666;margin-bottom:52px;max-width:560px;margin-left:auto;margin-right:auto;}
.category-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;}
.category-tile{display:block;text-decoration:none;color:inherit;background:white;border:1px solid #eee;border-radius:3px;padding:44px 32px;transition:border-color 0.2s,box-shadow 0.2s,transform 0.2s;}
.category-tile:hover{border-color:#333;box-shadow:0 4px 16px rgba(0,0,0,0.06);transform:translateY(-2px);}
.category-tile .tile-icon{width:52px;height:52px;margin:0 auto 22px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:#F5F2ED;color:#333;}
.category-tile .tile-icon svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.category-tile h2{font-family:'DM Serif Display',serif;font-size:1.3em;font-weight:400;margin-bottom:10px;}
.category-tile p{font-size:0.85em;color:#666;line-height:1.6;margin-bottom:0;}
.category-tile .tile-meta{font-family:'DM Mono',monospace;font-size:0.68em;letter-spacing:0.1em;text-transform:uppercase;color:#999;display:block;margin-top:10px;}
.category-tile .tile-arrow{font-family:'DM Mono',monospace;font-size:0.7em;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-top:18px;display:block;transition:color 0.2s;}
.category-tile:hover .tile-arrow{color:#333;}
@media(max-width:700px){
  .navbar{padding:16px 24px;}
  .content-wrapper{padding:40px 24px;}
  .category-grid{grid-template-columns:1fr;}
  h1{font-size:1.7em;}
}
</style>
</head>
