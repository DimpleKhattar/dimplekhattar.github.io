<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Dimple Khattar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #E8EEF5;
            margin: 0;
            padding: 0;
        }

        .navbar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #E8EEF5;
            box-sizing: border-box;
        }

        .navbar-title {
            font-family: Cambria, Georgia, serif;
            font-size: 1.2em;
            font-weight: 400;
            color: #333;
            margin: 0;
        }

        .nav-icons {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-icons a {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.3s;
            text-decoration: none;
        }

        .nav-icons a:hover {
            opacity: 0.6;
        }

        .nav-icons svg {
            width: 24px;
            height: 24px;
            stroke: #333;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 100px);
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .message {
            font-family: Calibri, 'Segoe UI', sans-serif;
            font-size: 1.2em;
            color: #555;
            line-height: 1.8;
            margin: 0;
            font-weight: 400;
        }

        @media (max-width: 600px) {
            .navbar {
                padding: 15px 20px;
            }

            .navbar-title {
                font-size: 1.1em;
            }

            .nav-icons {
                gap: 20px;
            }

            .nav-icons svg {
                width: 20px;
                height: 20px;
            }

            .message {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1 class="navbar-title">Dimple Khattar</h1>
        <div class="nav-icons">

                    <path d="M9 13h6"/>

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
